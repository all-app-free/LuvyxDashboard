<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luvyx Dashboard Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #001a33 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }

        /* Čas a Datum */
        .header {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        #clock {
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(0, 150, 255, 0.4);
        }

        #date {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 2px;
            text-transform: capitalize;
        }

        /* Google Vyhledávání */
        .search-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 25px;
        }

        .search-form {
            display: flex;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 2px 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .search-form input {
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            width: 100%;
            outline: none;
            font-size: 1rem;
        }

        .search-form button {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
        }

        /* Mřížka aplikací 3x4 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 450px;
            padding-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px 5px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
        }

        .card:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.15);
        }

        .card i {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Barevné akcenty */
        .card.game i { background: linear-gradient(45deg, #42e695, #3bb2b8); -webkit-background-clip: text; }
        .card.creative i { background: linear-gradient(45deg, #f093fb, #f5576c); -webkit-background-clip: text; }
        .card.utility i { background: linear-gradient(45deg, #feb47b, #ff7e5f); -webkit-background-clip: text; }

        .card span {
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 95%;
        }

        /* Optimalizace pro malé displeje */
        @media (max-width: 360px) {
            .grid-container { gap: 10px; }
            .card i { font-size: 1.6rem; }
            #clock { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="clock">00:00</div>
        <div id="date">Načítání...</div>
    </div>

    <div class="search-container">
        <form class="search-form" action="https://www.google.com/search" method="GET" target="_blank">
            <input type="text" name="q" placeholder="Hledat..." required>
            <button type="submit"><i class="fas fa-search"></i></button>
        </form>
    </div>

    <div class="grid-container">
        <a href="https://all-app-free.github.io/Chat/" class="card" target="_blank">
            <i class="fas fa-comments"></i>
            <span>Chat</span>
        </a>

        <a href="https://goblinekkk.github.io/ThrumAI/" class="card" target="_blank">
            <i class="fas fa-robot"></i>
            <span>ThrumAI</span>
        </a>

        <a href="https://all-app-free.github.io/Calendary/" class="card" target="_blank">
            <i class="fas fa-calendar-alt"></i>
            <span>Kalendář</span>
        </a>

        <a href="https://goblinekkk.github.io/LuvyxVideo/" class="card" target="_blank">
            <i class="fas fa-play-circle"></i>
            <span>LuvyxVideo</span>
        </a>

        <a href="https://goblinekkk.github.io/Meet-Me/" class="card" target="_blank">
            <i class="fas fa-video"></i>
            <span>Meet Me</span>
        </a>

        <a href="https://all-app-free.github.io/Notes/" class="card" target="_blank">
            <i class="fas fa-sticky-note"></i>
            <span>Notes</span>
        </a>

        <a href="https://all-app-free.github.io/Canvas/" class="card creative" target="_blank">
            <i class="fas fa-paint-brush"></i>
            <span>Canvas</span>
        </a>

        <a href="https://all-app-free.github.io/LuvyxQR/" class="card utility" target="_blank">
            <i class="fas fa-qrcode"></i>
            <span>QR Generátor</span>
        </a>

        <a href="https://all-app-free.github.io/Weather/" class="card utility" target="_blank">
            <i class="fas fa-cloud-sun"></i>
            <span>Počasí</span>
        </a>

        <a href="https://all-app-free.github.io/Maps/" class="card utility" target="_blank">
            <i class="fas fa-map-marked-alt"></i>
            <span>Mapy</span>
        </a>

        <a href="https://all-app-free.github.io/Luvyx-Spirit-Level/" class="card utility" target="_blank">
            <i class="fas fa-level-up-alt"></i>
            <span>Vodováha</span>
        </a>

        <a href="https://all-app-free.github.io/idle-hacker/" class="card game" target="_blank">
            <i class="fas fa-terminal"></i>
            <span>Idle Hacker</span>
        </a>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('cs-CZ', options);
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
